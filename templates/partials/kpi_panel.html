<div class="kpi-panel">
  <h3>{{ _(title) }}</h3>
  <div class="kpi-current">{{ current_total }}</div>
  <div class="kpi-previous">{{ prev_total }}</div>
  <div class="kpi-change {{ delta_dir }}">{{ pct_change }}</div>
  {% if cta_label and cta_href %}
    <a href="{{ cta_href }}" class="btn btn-secondary">{{ _(cta_label) }}</a>
  {% endif %}
</div>
