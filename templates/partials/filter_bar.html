<div class="filter-bar">
  <h2>{{ _('Gestion des factures') }}</h2>
  <form method="get">
    <div class="date-range">
      <label>
        {{ _('From') }}
        <input type="date" name="start_date" />
      </label>
      <label>
        {{ _('To') }}
        <input type="date" name="end_date" />
      </label>
    </div>

    <div class="status-chips">
      {% for status in statuses %}
        <button type="button" class="chip btn-secondary" data-status="{{ status.value }}">
          {{ _(status.label) }}
        </button>
      {% endfor %}
    </div>

    <div class="selectors">
      <select name="client">
        <option value="">{{ _('Clients & Prospects') }}</option>
        {% for client in clients %}
          <option value="{{ client.id }}">{{ client.name }}</option>
        {% endfor %}
      </select>
      <select name="supplier">
        <option value="">{{ _('Achats') }}</option>
        {% for supplier in suppliers %}
          <option value="{{ supplier.id }}">{{ supplier.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="search-box">
      <input type="search" name="q" placeholder="{{ _('Search') }}" />
      <button type="submit" class="btn btn-primary">{{ _('Filter') }}</button>
    </div>
  </form>
</div>
