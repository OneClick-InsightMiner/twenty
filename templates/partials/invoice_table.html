<table class="table is-fullwidth is-striped">
  <thead>
    <tr>
      <th>Date</th>
      <th>Client</th>
      <th>Montant</th>
    </tr>
  </thead>
  <tbody>
    {% for invoice in invoices %}
    <tr>
      <td>{{ invoice.date|date:'Y-m-d' }}</td>
      <td>{{ invoice.client }}</td>
      <td>{{ invoice.amount }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">Aucune facture.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
