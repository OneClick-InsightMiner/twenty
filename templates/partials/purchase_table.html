<table class="table is-fullwidth is-striped">
  <thead>
    <tr>
      <th>Date</th>
      <th>Fournisseur</th>
      <th>Montant</th>
    </tr>
  </thead>
  <tbody>
    {% for purchase in purchases %}
    <tr>
      <td>{{ purchase.date|date:'Y-m-d' }}</td>
      <td>{{ purchase.vendor }}</td>
      <td>{{ purchase.amount }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">Aucun achat.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
